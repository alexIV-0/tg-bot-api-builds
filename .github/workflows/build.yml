name: build-telegram-bot-api

# Сборка ТОЛЬКО из main. Другие ветки автосборку/релиз не запускают.
# workflow_dispatch — ручной запуск кнопкой (тоже только из main по умолчанию).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # нужно для создания/обновления релиза

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-x86_64
            os: macos-13 # Intel-раннер → x86_64 (под Intel iMac)
            asset: telegram-bot-api-macos-x86_64
          - name: macos-arm64
            os: macos-14 # Apple Silicon → arm64
            asset: telegram-bot-api-macos-arm64
          - name: windows-x86_64
            os: windows-latest
            asset: telegram-bot-api-windows-x86_64.exe
    steps:
      - name: Clone telegram-bot-api (recursive)
        run: git clone --recursive https://github.com/tdlib/telegram-bot-api.git

      # ───────────── macOS ─────────────
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gperf cmake openssl
          cd telegram-bot-api
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX:PATH=.. \
                -DOPENSSL_ROOT_DIR="$(brew --prefix openssl)" ..
          cmake --build . --target install -j 4
          cd ..
          cp bin/telegram-bot-api "${{ github.workspace }}/${{ matrix.asset }}"
          chmod +x "${{ github.workspace }}/${{ matrix.asset }}"

      # ───────────── Windows ─────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          vcpkg install gperf:x64-windows openssl:x64-windows zlib:x64-windows
          cd telegram-bot-api
          mkdir build
          cd build
          cmake -A x64 ^
                -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_INSTALL_PREFIX:PATH=.. ^
                -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake ^
                ..
          cmake --build . --target install --config Release
          cd ..
          copy bin\telegram-bot-api.exe "%GITHUB_WORKSPACE%\${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: telegram-bot-api binaries (latest)
          body: |
            Автосборка telegram-bot-api (tdlib) под macOS (x86_64, arm64) и Windows (x64).
            Используется приложением fs.manager для скачивания/постинга файлов >20МБ.
            Стабильные ссылки (тег `latest`):
            - macOS Intel:  releases/download/latest/telegram-bot-api-macos-x86_64
            - macOS ARM:    releases/download/latest/telegram-bot-api-macos-arm64
            - Windows x64:  releases/download/latest/telegram-bot-api-windows-x86_64.exe
          files: dist/*
          fail_on_unmatched_files: true
