name: build-telegram-bot-api

# Сборка ТОЛЬКО из main. Другие ветки автосборку/релиз не запускают.
# workflow_dispatch — ручной запуск кнопкой (тоже только из main по умолчанию).
#
# CI собирает ДВА самодостаточных бинаря: macOS arm64 и Windows x64.
# openssl/zlib вшиты статически — на чистой машине запускаются без Homebrew/DLL.
#
# Intel x86_64 здесь НЕ собирается (раннер macos-13 крайне медленный/нестабилен) —
# его собирают ЛОКАЛЬНО на Intel-маке и добавляют в релиз `latest` ВРУЧНУЮ.
# Ручной ассет telegram-bot-api-macos-x86_64 переживает повторные прогоны:
# action-gh-release перезаписывает только одноимённые файлы, чужие ассеты не трогает.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # нужно для создания/обновления релиза

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14 # Apple Silicon → arm64
            asset: telegram-bot-api-macos-arm64
          - name: windows-x86_64
            os: windows-latest
            asset: telegram-bot-api-windows-x86_64.exe
    steps:
      - name: Clone telegram-bot-api (recursive)
        run: git clone --recursive https://github.com/tdlib/telegram-bot-api.git

      # ───────────── macOS (самодостаточный: openssl вшит статически) ─────────────
      # OPENSSL_USE_STATIC_LIBS=TRUE → линкуемся с libssl.a/libcrypto.a из brew,
      #   а не с dylib по жёсткому пути → бинарь не зависит от Homebrew на чужой машине.
      # CMAKE_OSX_DEPLOYMENT_TARGET=11.0 → запустится и на старых Apple Silicon (Big Sur+).
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gperf cmake openssl
          cd telegram-bot-api
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX:PATH=.. \
                -DOPENSSL_ROOT_DIR="$(brew --prefix openssl)" \
                -DOPENSSL_USE_STATIC_LIBS=TRUE \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
                ..
          cmake --build . --target install -j 4
          cd ..
          cp bin/telegram-bot-api "${{ github.workspace }}/${{ matrix.asset }}"
          chmod +x "${{ github.workspace }}/${{ matrix.asset }}"
          echo "=== linked libs (НЕ должно быть libssl/libcrypto .dylib) ==="
          otool -L "${{ github.workspace }}/${{ matrix.asset }}"

      # ───────────── Windows (самодостаточный: openssl/zlib/CRT вшиты, без DLL) ─────────────
      # Триплет x64-windows-static → openssl и zlib статические.
      # CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded → сам telegram-bot-api тоже /MT,
      #   иначе несовпадение CRT с статическими портами vcpkg.
      # gperf оставляем x64-windows: это build-инструмент (генерит код), не линкуется в .exe.
      #   НО: раз задан VCPKG_TARGET_TRIPLET=x64-windows-static, vcpkg добавляет в путь поиска
      #   tools/ только статического триплета, поэтому gperf (он x64-windows) не находится
      #   автоматически — указываем его явно через GPERF_EXECUTABLE.
      #
      # ФОЛБЭК: если упадёт на несовпадении CRT (LNK2038 / mixing /MT and /MD) или
      #   проект не уважает CMP0091 — поменяй триплет на x64-windows-static-md и
      #   убери строку -DCMAKE_MSVC_RUNTIME_LIBRARY (тогда .exe потребует VC++ Redistributable,
      #   но он есть почти на всех Windows 10/11).
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          vcpkg install gperf:x64-windows openssl:x64-windows-static zlib:x64-windows-static
          cd telegram-bot-api
          mkdir build
          cd build
          cmake -A x64 ^
                -DCMAKE_BUILD_TYPE=Release ^
                -DCMAKE_INSTALL_PREFIX:PATH=.. ^
                -DCMAKE_TOOLCHAIN_FILE=%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake ^
                -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
                -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
                -DGPERF_EXECUTABLE:FILEPATH="%VCPKG_INSTALLATION_ROOT%\installed\x64-windows\tools\gperf\gperf.exe" ^
                ..
          cmake --build . --target install --config Release
          cd ..
          copy bin\telegram-bot-api.exe "%GITHUB_WORKSPACE%\${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: telegram-bot-api binaries (latest)
          body: |
            Автосборка telegram-bot-api (tdlib): самодостаточные бинари (openssl/zlib вшиты статически).
            CI собирает: macOS arm64 и Windows x64.
            macOS Intel (x86_64) добавляется в этот релиз ВРУЧНУЮ (собирается локально на Intel-маке).
            Используется приложением fs.manager для скачивания/постинга файлов >20МБ.
            Стабильные ссылки (тег `latest`):
            - macOS ARM:    releases/download/latest/telegram-bot-api-macos-arm64
            - macOS Intel:  releases/download/latest/telegram-bot-api-macos-x86_64  (добавляется вручную)
            - Windows x64:  releases/download/latest/telegram-bot-api-windows-x86_64.exe
          files: dist/*
          fail_on_unmatched_files: true
